<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AHMR | Premium Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap');
    body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
    h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
    .fade-in { animation: fadeIn 1s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .hover-scale { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .hover-scale:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .nav-link { position: relative; }
    .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 0; background-color: #000; transition: width 0.3s ease; }
    .nav-link:hover::after { width: 100%; }
  </style>
</head>
<body class="bg-stone-50 text-stone-900">
  <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-stone-200 transition-all duration-300" id="navbar">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <div class="flex-shrink-0 flex items-center">
          <a href="#" class="text-3xl font-bold tracking-tighter serif">AHMR.</a>
        </div>
        <div class="hidden md:flex space-x-8">
          <a href="#collections" class="text-stone-800 hover:text-black font-medium nav-link">Collections</a>
          <a href="#about" class="text-stone-800 hover:text-black font-medium nav-link">Our Story</a>
        </div>
        <div class="flex items-center space-x-6">
          <button class="text-stone-800 hover:text-black transition-colors"><i class="fas fa-search text-lg"></i></button>
          <button class="text-stone-800 hover:text-black transition-colors relative">
            <i class="fas fa-shopping-bag text-lg"></i><span class="absolute -top-2 -right-2 bg-black text-white text-xs rounded-full h-4 w-4 flex items-center justify-center">0</span>
          </button>
        </div>
      </div>
    </div>
  </nav><div class="relative h-screen flex items-center justify-center overflow-hidden">
    <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070&auto=format&fit=crop" alt="Fashion Hero" class="absolute w-full h-full object-cover object-center" />
    <div class="absolute inset-0 bg-black/30"></div>
    <div class="relative z-10 text-center text-white px-4 fade-in">
      <p class="text-sm md:text-base tracking-[0.3em] uppercase mb-4 font-light">New Collection</p>
      <h1 class="text-5xl md:text-7xl font-bold mb-6 serif">Elegance Redefined</h1>
      <p class="text-lg md:text-xl mb-10 font-light max-w-2xl mx-auto">Discover pieces curated for the modern aesthetic. Timeless, bold, and unapologetically you.</p>
      <a href="#collections" class="bg-white text-black px-8 py-4 uppercase tracking-wider text-sm font-medium hover:bg-stone-200 transition-colors duration-300">Shop Now</a>
    </div>
  </div>

  <section id="collections" class="py-24 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="text-center mb-16">
        <h2 class="text-3xl md:text-4xl font-bold mb-4 serif">Curated For You</h2>
        <div class="w-16 h-0.5 bg-black mx-auto"></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
        <div class="group cursor-pointer hover-scale rounded-xl overflow-hidden bg-stone-50">
          <div class="relative h-96 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1434389678232-040e509426f1?q=80&w=1964&auto=format&fit=crop" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-300"></div>
            <button class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-2 uppercase text-xs tracking-wider opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-4 group-hover:translate-y-0" onclick="alert('Added to cart!')">Add to Cart</button>
          </div>
          <div class="p-6 text-center">
            <h3 class="text-lg font-medium mb-2">The Classic Coat</h3>
            <p class="font-semibold">$189.00</p>
          </div>
        </div>
        <div class="group cursor-pointer hover-scale rounded-xl overflow-hidden bg-stone-50">
          <div class="relative h-96 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1576566588028-4147f3842f27?q=80&w=1964&auto=format&fit=crop" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-300"></div>
            <button class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-2 uppercase text-xs tracking-wider opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-4 group-hover:translate-y-0" onclick="alert('Added to cart!')">Add to Cart</button>
          </div>
          <div class="p-6 text-center">
            <h3 class="text-lg font-medium mb-2">Minimalist Tee</h3>
            <p class="font-semibold">$45.00</p>
          </div>
        </div>
        <div class="group cursor-pointer hover-scale rounded-xl overflow-hidden bg-stone-50">
          <div class="relative h-96 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=1936&auto=format&fit=crop" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-300"></div><button class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-2 uppercase text-xs tracking-wider opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-4 group-hover:translate-y-0" onclick="alert('Added to cart!')">Add to Cart</button>
          </div>
          <div class="p-6 text-center">
            <h3 class="text-lg font-medium mb-2">Leather Tote</h3>
            <p class="font-semibold">$120.00</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-black text-white py-16 text-center">
    <p>&copy; 2026 AHMR. Created by Ibtisam.</p>
  </footer>

  <script>
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      window.scrollY > 50 ? nav.classList.add('shadow-md') : nav.classList.remove('shadow-md');
    });
  </script>
</body>
</html>
